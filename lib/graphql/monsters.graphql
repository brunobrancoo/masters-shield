query GetMonsters($name: String) {
  monsters(name: $name) {
    name
    index
    actions {
      action_options {
        type
        desc
      }

      attack_bonus
      desc
      multiattack_type
      name
      options {
        desc
      }
      damage {
        ... on Damage {
          damage_dice
          damage_type {
            index
            name
          }
        }
      }
    }
    alignment
    challenge_rating
    charisma
    condition_immunities {
      index
      name
      desc
      updated_at
    }
    constitution
    damage_immunities
    damage_resistances
    damage_vulnerabilities
    dexterity
    forms {
      name
    }
    hit_dice
    hit_points
    hit_points_roll
    image
    index
    intelligence
    languages
    legendary_actions {
      name
      desc
      attack_bonus
      damage {
        damage_dice
        damage_type {
          name
        }
      }
      dc {
        dc_value
        success_type
      }
    }
    name
    proficiencies {
      proficiency {
        name
      }
      value
    }
    reactions {
      name
      desc
      dc {
        dc_value
        success_type
      }
    }
    senses {
      blindsight
      darkvision
      passive_perception
      tremorsense
      truesight
    }
    size
    special_abilities {
      name
      desc
      attack_bonus
      damage {
        damage_dice
        damage_type {
          name
        }
      }
      dc {
        dc_value
        success_type
        dc_type {
          name
        }
      }
      spellcasting {
        slots {
          count
          slot_level
        }
        spells {
          spell {
            name
            level
          }
        }
      }
      usage {
        rest_types
        times
        type
      }
    }
    speed {
      burrow
      climb
      fly
      hover
      swim
      walk
    }
    strength
    subtype
    type
    wisdom
    xp
    updated_at
    armor_class {
      ... on ArmorClassDex {
        type
        value
        desc
      }
      ... on ArmorClassNatural {
        type
        value
        desc
      }
      ... on ArmorClassArmor {
        type
        value
        desc
        armor {
          index
          name
          properties {
            name
          }
        }
      }
      ... on ArmorClassSpell {
        type
        value
        spell {
          name
          level
        }
        desc
      }
      ... on ArmorClassCondition {
        type
        value
        condition {
          name
        }
        desc
      }
    }
  }
}

